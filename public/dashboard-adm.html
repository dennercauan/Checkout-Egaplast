<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administração - Egaplast</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="img/favicon.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- TEMA DARK (BASE) --- */
        body { 
            background: #1a1a1a; 
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            font-size: 14px; 
            overflow-x: hidden;
        }

        body.loading-active { overflow: hidden !important; height: 100vh; }

        .app-container { width: 95%; max-width: 1600px; margin: 0 auto; padding: 20px 0; box-sizing: border-box; }

        /* --- NAV-BAR --- */
        .modern-navbar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
            border-radius: 12px; padding: 10px 25px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            position: sticky; top: 15px; z-index: 100; margin-bottom: 30px;
        }
        .nav-brand { display: flex; align-items: center; gap: 15px; }
        .nav-logo { height: 44px; width: auto; transition: transform 0.3s ease; cursor: pointer; }
        .nav-logo:hover { transform: scale(1.1); }
        .nav-title { color: #333; font-size: 18px; font-weight: 700; border-left: 1px solid #ddd; padding-left: 15px; letter-spacing: 0.5px; }
        .nav-actions { display: flex; align-items: center; gap: 15px; }

        /* BUSCA */
        .search-container { position: relative; display: flex; align-items: center; }
        .search-expandable { background: transparent; border: 1px solid transparent; padding: 8px 12px 8px 35px; border-radius: 20px; width: 0px; font-size: 13px; color: #333; transition: all 0.4s ease; opacity: 0; cursor: pointer; }
        .search-icon-overlay { position: absolute; left: 10px; color: #555; font-size: 14px; pointer-events: none; }
        .search-container:hover .search-expandable, .search-expandable:focus, .search-expandable:not(:placeholder-shown) { width: 250px; background: #f0f2f5; border-color: #ddd; opacity: 1; cursor: text; }
        .search-expandable:focus { outline: none; background: #fff; border-color: #f26522; box-shadow: 0 0 0 3px rgba(242, 101, 34, 0.1); }

        .btn-logout { background: #f2f2f2; color: #555; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; transition: all 0.2s; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .btn-logout:hover { background: #e0e0e0; color: #dc3545; transform: translateY(-2px); }

        /* HEADER CONTEÚDO */
        .content-header { display: flex; align-items: center; margin-bottom: 30px; padding-left: 10px; }
        .content-header h1 { color: #fff; font-size: 20px; font-weight: 300; display: flex; align-items: center; gap: 15px; }
        .content-header i { color: #f26522; font-size: 24px; }
        .content-header strong { font-weight: 700; }

        /* CARDS GRID */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding-bottom: 60px; }
        .adm-card { background: linear-gradient(145deg, #2b2b2b, #1f1f1f); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; cursor: pointer; position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); opacity: 0; animation: fadeInUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .adm-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #f26522, #0d3269); opacity: 0.7; }
        .adm-card:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 15px 30px rgba(0,0,0,0.5); border-color: rgba(255,255,255,0.2); background: linear-gradient(145deg, #323232, #252525); }

        .card-normal-content { height: 100%; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.4s ease, filter 0.4s ease, opacity 0.4s ease; }
        .adm-card:hover .card-normal-content { transform: translateY(-30px); filter: blur(4px); opacity: 0.3; }

        .adm-date { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; letter-spacing: 0.5px; }
        .adm-date i { color: #f26522; background: rgba(242, 101, 34, 0.1); padding: 8px; border-radius: 8px; font-size: 16px; }

        .card-footer-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        .stat-item { display: flex; flex-direction: column; gap: 4px; }
        .stat-item span { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; font-weight: 600; }
        .stat-item strong { font-size: 16px; color: #e0e0e0; display: flex; align-items: center; gap: 8px; }
        .stat-item strong i { font-size: 12px; }
        .icon-users { color: #00b0ff; }
        .icon-docs { color: #f26522; }

        /* OVERLAY PREVIEW */
        .card-preview-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(13, 50, 105, 0.98), rgba(37, 37, 37, 0.7)); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; gap: 15px; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .adm-card:hover .card-preview-overlay { transform: translateY(0); }
        .preview-stat { text-align: center; opacity: 0; transform: translateY(20px); transition: all 0.3s ease 0.1s; }
        .adm-card:hover .preview-stat { opacity: 1; transform: translateY(0); }
        .preview-value { font-size: 32px; font-weight: 800; color: #fff; line-height: 1; }
        .preview-label { font-size: 10px; color: #a6cbf3; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-top: 5px; }
        .preview-btn { background: #f26522; color: white; border: none; padding: 8px 20px; border-radius: 30px; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(242, 101, 34, 0.4); opacity: 0; transform: scale(0.8); transition: all 0.3s ease 0.2s; }
        .adm-card:hover .preview-btn { opacity: 1; transform: scale(1); }
        .preview-btn:hover { background: #ff7b3e; transform: scale(1.05); }

        /* LOADER */
        #page-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 20px; transition: opacity 0.6s ease-out, visibility 0.6s; }
        .loader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        #app-content { opacity: 0; transform: translateY(15px); transition: opacity 0.6s ease-out, transform 0.6s ease-out; }
        .content-visible { opacity: 1 !important; transform: translateY(0) !important; }
        .modern-loader { position: relative; width: 60px; height: 60px; }
        .loader-ring { position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; }
        .ring-1 { border-top-color: #0d3269; border-right-color: #0d3269; animation: spin-reactor 1.5s cubic-bezier(0.4, 0, 0.2, 1) infinite; box-shadow: 0 0 15px rgba(13, 50, 105, 0.5); }
        .ring-2 { inset: 8px; border-bottom-color: #f26522; border-left-color: #f26522; animation: spin-reactor 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse; filter: drop-shadow(0 0 8px rgba(242, 101, 34, 0.6)); }
        .loader-core { position: absolute; inset: 30px; background: #fff; border-radius: 50%; animation: pulse-reactor 1.5s ease-in-out infinite; box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); }
        .loader-text { color: #fff; font-size: 16px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; animation: fade-text 1.5s ease-in-out infinite alternate; margin-top: 10px;}

        @keyframes spin-reactor { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse-reactor { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 30px rgba(255, 255, 255, 1); } }
        @keyframes fade-text { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODAL CORRIGIDO (LAYOUT DE DETALHES) --- */
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(5px); z-index: 9999; justify-content: center; align-items: center; animation: overlayEntry 0.4s ease-out forwards; }
        
        /* Modal de Busca */
        .search-modal-box { background: #1e1e1e; width: 90%; max-width: 900px; max-height: 80vh; border-radius: 12px; border: 1px solid #444; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; opacity: 0; animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

        /* Modal de Detalhes (Tela Cheia) */
        .details-modal { background: #1e1e1e; width: 95vw; max-width: 1200px; height: 90vh; border-radius: 12px; border: 1px solid #444; display: flex; flex-direction: column; box-shadow: 0 0 50px rgba(0,0,0,0.8); position: relative; opacity: 0; animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        .adm-modal-header { padding: 20px 30px; background: #252525; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; border-radius: 12px 12px 0 0; }
        .adm-modal-header h2 { margin: 0; color: #fff; font-size: 20px; }
        .close-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 24px; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .close-btn:hover { background: #f26522; }
        .adm-modal-body { padding: 30px; overflow-y: auto; color: #ddd; background: #1e1e1e; flex-grow: 1; width: 100%; box-sizing: border-box; }
        .adm-modal-body::-webkit-scrollbar { width: 8px; }
        .adm-modal-body::-webkit-scrollbar-track { background: #1e1e1e; }
        .adm-modal-body::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }

        /* ESTILOS INTERNOS DO MODAL DE DETALHES (TABELAS E TAGS) */
        .detail-section { margin-bottom: 40px; width: 100%; }
        .detail-section h3 { color: #f26522; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #444; padding-bottom: 10px; margin-top: 0; margin-bottom: 20px; width: 100%; }
        .detail-section p { margin: 10px 0; font-size: 16px; color: #ccc; }
        .modal-table { width: 100%; border-collapse: collapse; font-size: 15px; border: 1px solid #333; border-radius: 8px; overflow: hidden; background: #1e1e1e; }
        .modal-table th { text-align: left; background: #2a2a2a; color: #fff; padding: 15px; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #444; }
        .modal-table td { border-bottom: 1px solid #333; padding: 15px; color: #ccc; }
        .modal-table tr:last-child td { border-bottom: none; }
        .tag-doc { background: rgba(13, 50, 105, 0.6); color: #a6cbf3; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
        .tag-csv { font-family: monospace; color: #4fc3f7; background: rgba(79, 195, 247, 0.1); padding: 4px 8px; border-radius: 4px; }

        /* Resultados da Busca */
        .search-result-card { background: #2a2a2a; border: 1px solid #444; border-radius: 10px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .search-result-card:hover { background: #333; border-color: #666; }
        .res-info h4 { margin: 0 0 8px 0; color: #fff; font-size: 18px; }
        .res-info p { margin: 5px 0; color: #aaa; font-size: 14px; }
        .res-highlight { color: #f26522; font-weight: bold; }
        .res-action button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .res-action button:hover { background: #0056b3; }

        @keyframes overlayEntry { from { opacity: 0; backdrop-filter: blur(0px); } to { opacity: 1; backdrop-filter: blur(5px); } }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .popup-overlay.closing { animation: overlayExit 0.3s ease-in forwards; pointer-events: none; }
        .popup-overlay.closing .details-modal { animation: modalDrop 0.3s ease-in forwards; }
        .popup-overlay.closing .search-modal-box { animation: modalDrop 0.3s ease-in forwards; }
        @keyframes overlayExit { from { opacity: 1; backdrop-filter: blur(5px); } to { opacity: 0; backdrop-filter: blur(0px); } }
        @keyframes modalDrop { from { opacity: 1; transform: scale(1) translateY(0); } to { opacity: 0; transform: scale(0.95) translateY(20px); } }
    </style>
</head>
<body class="loading-active">

    <div id="page-loader">
        <div class="modern-loader">
            <div class="loader-ring ring-1"></div>
            <div class="loader-ring ring-2"></div>
            <div class="loader-core"></div>
        </div>
        <div class="loader-text">Carregando...</div>
    </div>

    <div id="app-content" class="app-container">

        <nav class="modern-navbar">
            <div class="nav-brand">
                <img src="img/egaplast.png" alt="Egaplast" class="nav-logo" onclick="transitionToPage('dashboard.html')">
                <span class="nav-title">Painel Administrativo</span>
            </div>

            <div class="nav-actions">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon-overlay"></i>
                    <input type="text" id="globalSearchInput" class="search-expandable" placeholder="Buscar Pedido (Romaneio, Loja, Criador)...">
                </div>

                <button id="logoutBtn" class="btn-logout">
                    <i class="fa-solid fa-right-from-bracket"></i> Sair
                </button>
            </div>
        </nav>

        <div class="content-header">
            <h1>
                <i class="fa-solid fa-calendar-days"></i>
                Visão Geral por <strong>Data</strong>
            </h1>
        </div>

        <div id="dates-container" class="cards-grid">
            </div>

    </div>

    <div id="searchModal" class="popup-overlay">
        <div class="search-modal-box">
            <div class="adm-modal-header">
                <h2 id="searchTitle">Resultados da Busca</h2>
                <button class="close-btn" onclick="closeSearch()">&times;</button>
            </div>
            <div class="adm-modal-body" id="searchResults"></div>
        </div>
    </div>

    <div id="detailsModal" class="popup-overlay">
        <div class="details-modal">
            <div class="adm-modal-header">
                <h2 id="modalTitle">Detalhes do Pedido</h2>
                <button class="close-btn" onclick="closeDetails()">&times;</button>
            </div>
            <div class="adm-modal-body" id="modalBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="js/dashboard-adm.js"></script>
</body>
</html>
